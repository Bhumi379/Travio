<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Travio</title>
    
    <link rel="stylesheet" href="styles.css"> 
    </head>
<body>

    <ul class="bg-bubbles">
        <li style="left: 10%; width: 80px; height: 80px;"></li>
        <li style="left: 20%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 17s;"></li>
        <li style="left: 25%; animation-delay: 4s;"></li>
        <li style="left: 40%; width: 60px; height: 60px; animation-duration: 22s;"></li>
        <li style="left: 70%; width: 120px; height: 120px;"></li>
    </ul>

    <div class="main-content">
        </div>


<div id="home" class="page hidden"></div>    
 <div class="main-content">
<header class="header">
    <div class="header-left">
        <img src="images/logo.png" alt="Travio Logo" class="header-logo-img">
        <div class="logo-info">
            <h2>Travio</h2>
            <p>Travel Buddy</p>
        </div>
    </div>

    <nav class="top-nav">
       <a href="create_a_ride.html" class="nav-link" onclick="showPage('create-ride')">Create a Ride</a>
        <a href="previous_ride.html" class="nav-link" onclick="showPage('previous-rides')">Previous Rides</a>
        <a href="about.html" class="nav-link" onclick="showPage('about')">About</a>
        <a href="login.html" class="nav-link logout" onclick="logout()">Logout</a>
    </nav>

    <div class="header-right">
        <div class="notification">
            <img src="images/notification.gif" alt="Notifications" class="header-icon">
            
        </div>
        
        <div class="notification">
            <img src="images/chat-bot.gif" alt="Chat" class="header-icon chat-gif">
            
        </div>
        
        <div class="notification">
            <a href="profile.html">
           <img src="images/profile.gif" alt="User" class="header-avatar">
          </a>
     </div>
    </div>
</header>

    <div class="search-container search-container--top-strip">
      <form class="search-bar" onsubmit="event.preventDefault(); searchRides();">
        <div class="input-group">
          <span class="icon-circle"></span>
          <div class="autocomplete-wrapper">
            <input type="text" id="pickupSearch" placeholder="Leaving from" autocomplete="off">
            <ul id="pickupList" class="autocomplete-dropdown"></ul>
          </div>
        </div>
        <div class="divider"></div>
        <div class="input-group">
          <span class="icon-circle"></span>
          <div class="autocomplete-wrapper">
            <input type="text" id="destinationSearch" placeholder="Going to" autocomplete="off">
            <ul id="destList" class="autocomplete-dropdown"></ul>
          </div>
        </div>
        <div class="divider"></div>
        <div class="input-group date-group">
          <svg class="icon-calendar" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <input type="date" id="dateSearch">
        </div>
        <button type="submit" class="search-btn">Search</button>
      </form>
    </div>

                <div class="rides-section">
                    <h2 class="section-title">Your Previous Rides</h2>
                    <div class="rides-grid" id="previousRidesGrid">
                        <!-- Previous rides will be loaded here -->
                    </div>
                </div>
            </div>

</div>  
<script type="module" src="js/index.js"></script>  
</body>
</html>
