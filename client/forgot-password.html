<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffc98d;
}

/* Card container */
.container{
  background:white;
  padding:40px;
  width:350px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  text-align:center;
}

h2{
  margin-bottom:8px;
  color:#333;
}

p{
  font-size:14px;
  color:#666;
  margin-bottom:25px;
}

/* Input field */
input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
  margin-bottom:20px;
  outline:none;
  transition:0.2s;
}

input:focus{
  border-color:#ff9f43;
  box-shadow:0 0 0 2px rgba(255,201,141,0.4);
}

/* Button */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff9f43;
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#ff8c2f;
}

</style>

</head>

<body>

<div class="container">

<h2>Forgot Password</h2>
<p>Enter your email to receive a reset link</p>

<form id="forgotForm">
  <input type="email" id="email" placeholder="Enter your email" required>
  <button type="submit">Send Reset Link</button>
</form>

</div>

<script>

const form = document.getElementById("forgotForm");

form.addEventListener("submit", async (e) => {

  e.preventDefault();

  const email = document.getElementById("email").value;

  const res = await fetch("/api/auth/forgot-password", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email })
  });

  const data = await res.json();

  alert(data.message);
});

</script>

</body>
</html>
