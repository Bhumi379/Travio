<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - Travio</title>
    <link rel="stylesheet" href="styles.css">

    <style>
        body {
            display: block !important;
        }

        /* ══ HEADER: full width, stays at very top ══ */
        .main-content {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            width: 100% !important;
        }

        .main-content .header {
            position: relative !important;
            top: auto !important;
            left: auto !important;
            right: auto !important;
            width: 100% !important;
        }

        /* ══ FIXED FULL-HEIGHT LEFT SIDEBAR ══ */
        .profile-sidebar {
            position: fixed;
            top: 72px;
            left: 0;
            width: 290px;
            height: calc(100vh - 72px);
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-right: 1px solid rgba(245, 158, 11, 0.2);
            box-shadow: 4px 0 24px rgba(0, 0, 0, 0.07);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 30px;
            overflow-y: auto;
            z-index: 900;
            animation: profileEntrance 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .profile-sidebar::-webkit-scrollbar { width: 4px; }
        .profile-sidebar::-webkit-scrollbar-thumb {
            background: rgba(245,158,11,0.3);
            border-radius: 4px;
        }

        /* Orange top band */
        .sidebar-top-band {
            width: 100%;
            background: linear-gradient(135deg, #ff8c00, #ff4500);
            padding: 32px 20px 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .profile-sidebar .profile-avatar {
            width: 88px;
            height: 88px;
            font-size: 32px;
            margin-right: 0;
            margin-bottom: 12px;
            border: 3px solid rgba(255,255,255,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            
        }

        .sidebar-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .sidebar-id {
            font-size: 11px;
            color: #fff;
            background: rgba(0,0,0,0.22);
            border-radius: 20px;
            padding: 3px 14px;
            font-weight: 600;
            letter-spacing: 0.04em;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Info rows */
        .sidebar-info-list {
            width: 100%;
            padding: 0 18px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;
        }

        .sidebar-info-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 10px 13px;
            background: #fff9f0;
            border-radius: 10px;
            border-left: 3px solid #F59E0B;
        }

        .sidebar-info-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #F59E0B;
        }

        .sidebar-info-value {
            font-size: 12px;
            color: #374151;
            font-weight: 500;
            word-break: break-all;
            line-height: 1.4;
        }

        .sidebar-info-value.empty {
            color: #c4c4c4;
            font-style: italic;
        }

        .sidebar-divider {
            width: calc(100% - 36px);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(245,158,11,0.3), transparent);
            margin: 16px 18px;
            flex-shrink: 0;
        }

        /* Ride count badges */
        .sidebar-rides-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            padding: 0 18px;
            flex-shrink: 0;
        }

        .sidebar-ride-badge {
            background: linear-gradient(135deg, #fff9f0, #fff3e0);
            border: 1.5px solid rgba(245,158,11,0.35);
            border-radius: 12px;
            padding: 13px 8px;
            text-align: center;
            transition: transform 0.2s;
        }

        .sidebar-ride-badge:hover { transform: translateY(-2px); }

        .sidebar-ride-num {
            display: block;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #F59E0B, #FBBF24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .sidebar-ride-label {
            font-size: 8px;
            color: #9ca3af;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 600;
        }

        /* Save Changes button inside sidebar */
        .sidebar-save-btn {
            margin: 18px 18px 0;
            width: calc(100% - 36px);
            padding: 13px;
            background: linear-gradient(135deg, #F59E0B, #f77626);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(245,158,11,0.35);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }
        /* Save button should appear only in edit mode */
        #sidebarSaveBtn {
            display: none;
        }

        .sidebar-save-btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
        }

        .sidebar-save-btn:hover::before { width: 300px; height: 300px; }
        .sidebar-save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245,158,11,0.45);
        }

        .sidebar-edit-btn {
            margin: 12px 18px 0;
            width: calc(100% - 36px);
            padding: 11px;
            background: white;
            color: #f77626;
            border: 2px solid #f59e0b;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
        }
        .sidebar-edit-btn:hover {
            background: #fff6e8;
            transform: translateY(-1px);
        }

        .profile-edit-panel {
            margin: 12px 18px 0;
            width: calc(100% - 36px);
            background: #fff9f0;
            border: 1px solid rgba(245, 158, 11, 0.35);
            border-radius: 12px;
            padding: 12px;
        }
        .profile-edit-panel label {
            display: block;
            font-size: 11px;
            color: #b45309;
            font-weight: 700;
            margin: 10px 0 4px;
        }
        .profile-edit-panel input {
            width: 100%;
            border: 1px solid #fcd9b6;
            border-radius: 8px;
            padding: 9px 10px;
            font-size: 12px;
            background: #fff;
        }
        .profile-edit-panel input[readonly] {
            background: #f5f5f5;
            color: #777;
            cursor: not-allowed;
        }

        .profile-pictures-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 8px 0 12px 0;
            padding: 10px;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #fcd9b6;
        }

        .profile-pic-option {
            position: relative;
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .profile-pic-option img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile-pic-option:hover {
            transform: scale(1.05);
            border-color: #ff8c00;
        }

        .profile-pic-option.selected {
            border-color: #ff8c00;
            box-shadow: 0 0 8px rgba(255, 140, 0, 0.5);
        }

        .profile-pic-option.selected::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #ff8c00;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        /* ══ MAIN AREA: offset from sidebar, below header ══ */
        .profile-page-wrapper {
            position: fixed;
            top: 72px;
            left: 290px;
            width: calc(100vw - 290px);
            height: calc(100vh - 72px);
            overflow-y: auto;
            padding: 18px 36px 40px 36px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .profile-page-wrapper::-webkit-scrollbar {
            width: 8px;
        }

        .profile-page-wrapper::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .profile-page-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255, 140, 66, 0.6);
            border-radius: 10px;
        }

        .profile-page-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 140, 66, 0.8);
        }

        .profile-page-wrapper .rides-section {
            margin: 0;
        }

        /* Hidden form for js/index.js compatibility */
        #profileForm {
            display: none !important;
        }
        #profileForm.profile-form-visible {
            display: block !important;
        }

        .profile-header {
            display: none !important;
        }

        @media (max-width: 900px) {
            .main-content { position: relative; }
            .profile-sidebar {
                position: relative;
                top: 0; width: 100%; height: auto;
                border-right: none;
                border-bottom: 2px solid rgba(245,158,11,0.2);
            }
            .profile-page-wrapper {
                position: static;
                margin-left: 0;
                padding: 20px 16px 30px;
                width: auto;
                height: auto;
                overflow-y: visible;
            }
        }
        @media (max-width: 768px) {
            .main-content .header {
                padding: 12px 14px !important;
            }
            .profile-sidebar {
                padding-bottom: 18px;
            }
            .sidebar-top-band {
                padding: 20px 14px 16px;
                margin-bottom: 14px;
            }
            .profile-sidebar .profile-avatar {
                width: 72px;
                height: 72px;
                font-size: 26px;
            }
            .sidebar-name {
                font-size: 14px;
            }
            .sidebar-rides-row {
                grid-template-columns: 1fr 1fr;
            }
            .profile-page-wrapper {
                gap: 14px;
                padding: 14px 10px 22px;
            }
            .profile-pictures-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        @media (max-width: 480px) {
            .top-nav {
                gap: 10px !important;
                justify-content: flex-start;
            }
            .sidebar-info-list,
            .sidebar-rides-row {
                padding: 0 10px;
            }
            .sidebar-save-btn,
            .sidebar-edit-btn,
            .profile-edit-panel {
                width: calc(100% - 20px);
                margin-left: 10px;
                margin-right: 10px;
            }
            .profile-pictures-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                padding: 8px;
            }
            .sidebar-info-item {
                padding: 8px 10px;
            }
            .sidebar-info-value {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <ul class="bg-bubbles">
        <li style="left: 10%; width: 80px; height: 80px;"></li>
        <li style="left: 20%; width: 30px; height: 30px; animation-delay: 2s; animation-duration: 17s;"></li>
        <li style="left: 25%; animation-delay: 4s;"></li>
        <li style="left: 40%; width: 60px; height: 60px; animation-duration: 22s;"></li>
        <li style="left: 70%; width: 120px; height: 120px;"></li>
    </ul>

    <!-- ══ FULL-WIDTH HEADER ══ -->
    <div class="main-content">
        <header class="header">
            <div class="header-left">
                <img src="images/logo.png" alt="Travio Logo" class="header-logo-img">
                <div class="logo-info">
                    <h2>Travio</h2>
                    <p>Travel Buddy</p>
                </div>
            </div>
            <nav class="top-nav">
                <a href="index.html" class="nav-link" onclick="showPage('home')">Home</a>
                <a href="create_a_ride.html" class="nav-link" onclick="showPage('create-ride')">Create a Ride</a>
                <a href="about.html" class="nav-link" onclick="showPage('about')">Information</a>
                <a href="login.html" class="nav-link logout" onclick="logout()">Logout</a>
            </nav>
            <div class="header-right">
                <div class="notification">
                    <img src="images/notification.gif" alt="Notifications" class="header-icon">
                </div>
                <div class="notification">
                    <img src="images/chat-bot.gif" alt="Chat" class="header-icon chat-gif">
                </div>
                <div class="notification">
                    <a href="profile.html">
                        <img src="images/profile.gif" alt="User" class="header-avatar">
                    </a>
                </div>
            </div>
        </header>

       

    <!-- ══ FIXED LEFT SIDEBAR ══ -->
    <aside class="profile-sidebar">
        <div class="sidebar-top-band">
            <div class="profile-avatar" id="profileDisplayAvatar">?</div>
            <div class="sidebar-name" id="sidebarName">—</div>
            <div class="sidebar-id" id="sidebarId">BTBT...</div>
        </div>

        <div class="sidebar-info-list">
            <div class="sidebar-info-item">
                <span class="sidebar-info-label">📧 Email</span>
                <span class="sidebar-info-value empty" id="sidebarEmail">Not set</span>
            </div>
            <div class="sidebar-info-item">
                <span class="sidebar-info-label">📞 Contact No.</span>
                <span class="sidebar-info-value empty" id="sidebarPhone">Not set</span>
            </div>
            <div class="sidebar-info-item">
                <span class="sidebar-info-label">🛡️ Guardian No.</span>
                <span class="sidebar-info-value empty" id="sidebarGuardian">Not set</span>
            </div>
        </div>

        <div class="sidebar-divider"></div>

        <div class="sidebar-rides-row">
            <div class="sidebar-ride-badge">
                <span class="sidebar-ride-num" id="sidebarCurrentCount">0</span>
                <div class="sidebar-ride-label">Active Rides</div>
            </div>
            <div class="sidebar-ride-badge">
                <span class="sidebar-ride-num" id="sidebarPrevCount">0</span>
                <div class="sidebar-ride-label">Past Rides</div>
            </div>
        </div>

        <button class="sidebar-edit-btn" id="sidebarEditBtn">✏️ Edit Profile</button>

        <form id="profileForm" class="profile-edit-panel">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="name" placeholder="Enter your name">

            <label for="banasthaliId">Banasthali ID</label>
            <input type="text" id="banasthaliId" readonly>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="email@banasthali.in">

            <label for="phone">Contact No.</label>
            <input type="tel" id="phone" name="phone" placeholder="Your phone number">

            <label for="guardianPhone">Guardian No.</label>
            <input type="tel" id="guardianPhone" placeholder="Emergency contact">

            <label>Profile Picture</label>
            <div id="profilePicturesGrid" class="profile-pictures-grid"></div>
            <input type="hidden" id="selectedProfilePicture" name="profilePicture">

            <label for="password">New Password (optional)</label>
            <input type="password" id="password" placeholder="Leave blank to keep current">

            <button type="submit" id="originalSaveBtn" style="display:none;"></button>
        </form>

        <button class="sidebar-save-btn" id="sidebarSaveBtn">💾 Save Changes</button>
    </aside>

    <!-- ══ MAIN SCROLLABLE CONTENT ══ -->
    <div class="profile-page-wrapper">

        <section class="rides-section animate-profile">
            <h2 class="section-title">My Current Rides</h2>
            <div id="profileCurrentRidesGrid" class="rides-grid"></div>
        </section>

        <section class="rides-section animate-profile">
            <h2 class="section-title">My Previous Rides</h2>
            <div id="profilePreviousRidesGrid" class="rides-grid"></div>
        </section>

    </div>

    <script>
        const profileForm = document.getElementById('profileForm');
        const sidebarEditBtn = document.getElementById('sidebarEditBtn');
        const sidebarSaveBtn = document.getElementById('sidebarSaveBtn');

        // Show the profile editor immediately so the profile picture picker is visible.
        // (By default, CSS hides #profileForm until it has the `profile-form-visible` class.)
        if (profileForm) {
            profileForm.classList.add('profile-form-visible');
            if (sidebarSaveBtn) sidebarSaveBtn.style.display = 'block';
            if (sidebarEditBtn) sidebarEditBtn.textContent = '❌ Close Edit';
        }

        /* Show/hide editable form */
        sidebarEditBtn.addEventListener('click', () => {
            profileForm.classList.toggle('profile-form-visible');
            const isOpen = profileForm.classList.contains('profile-form-visible');
            if (sidebarSaveBtn) sidebarSaveBtn.style.display = isOpen ? 'block' : 'none';
            sidebarEditBtn.textContent = profileForm.classList.contains('profile-form-visible')
                ? '❌ Close Edit'
                : '✏️ Edit Profile';
        });

        /* Sidebar save triggers form submit */
        document.getElementById('sidebarSaveBtn').addEventListener('click', () => {
            document.getElementById('originalSaveBtn').click();
        });

        /* Sync sidebar display values */
        function syncSidebar() {
            const name     = document.getElementById('fullName').value.trim();
            const id       = document.getElementById('banasthaliId').value.trim();
            const email    = document.getElementById('email').value.trim();
            const phone    = document.getElementById('phone').value.trim();
            const guardian = document.getElementById('guardianPhone').value.trim();

            // If a profile picture is selected/saved, show image instead of letter
            const avatarEl = document.getElementById('profileDisplayAvatar');
            const selectedPic = document.getElementById('selectedProfilePicture')?.value?.trim() || "";
            if (avatarEl) {
                if (selectedPic) {
                    avatarEl.style.backgroundImage = `url('${selectedPic}')`;
                    avatarEl.style.backgroundSize = 'cover';
                    avatarEl.style.backgroundPosition = 'center';
                    avatarEl.textContent = '';
                } else {
                    avatarEl.style.backgroundImage = 'none';
                    avatarEl.textContent = name ? name.charAt(0).toUpperCase() : '?';
                }
            }
            document.getElementById('sidebarName').textContent = name || '—';
            document.getElementById('sidebarId').textContent   = id   || 'BTBT...';

            const set = (elId, val) => {
                const el = document.getElementById(elId);
                el.textContent = val || 'Not set';
                el.classList.toggle('empty', !val);
            };
            set('sidebarEmail',    email);
            set('sidebarPhone',    phone);
            set('sidebarGuardian', guardian);
        }

        ['fullName','banasthaliId','email','phone','guardianPhone'].forEach(id => {
            document.getElementById(id).addEventListener('input',  syncSidebar);
            document.getElementById(id).addEventListener('change', syncSidebar);
        });
        // Also resync avatar when user selects a new profile picture
        document.getElementById('profilePicturesGrid')?.addEventListener('click', syncSidebar);

        /* Poll so Firebase-filled values are caught after load */
        let n = 0;
        const poll = setInterval(() => { syncSidebar(); if (++n >= 20) clearInterval(poll); }, 200);

        /* Watch ride grids for count */
        const watchGrid = (gridId, countId) => {
            const g = document.getElementById(gridId);
            const c = document.getElementById(countId);
            if (!g || !c) return;
            new MutationObserver(() => { c.textContent = g.children.length; }).observe(g, { childList: true });
        };
        watchGrid('profileCurrentRidesGrid',  'sidebarCurrentCount');
        watchGrid('profilePreviousRidesGrid', 'sidebarPrevCount');
    </script>

    <script type="module" src="js/index.js"></script>
</body>
</html>
