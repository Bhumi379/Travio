<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - Travio</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffc98d;
}

/* Card */
.login-container{
  background:white;
  padding:40px;
  width:350px;
  border-radius:12px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* Header */
.login-header{
  text-align:center;
  margin-bottom:25px;
}

.login-header h2{
  color:#333;
  margin-bottom:5px;
}

.login-header p{
  font-size:14px;
  color:#666;
}

/* Form */
.form-group{
  margin-bottom:20px;
}

.form-group label{
  font-size:14px;
  font-weight:600;
  color:#444;
}

.input-wrapper{
  position:relative;
  margin-top:6px;
}

.input-icon{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
}

.form-group input{
  width:100%;
  padding:12px 12px 12px 35px;
  border:1px solid #ddd;
  border-radius:8px;
  font-size:14px;
  outline:none;
  transition:0.2s;
}

.form-group input:focus{
  border-color:#ff9f43;
  box-shadow:0 0 0 2px rgba(255,201,141,0.4);
}

/* Password toggle */
.password-toggle{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  cursor:pointer;
}

/* Button */
.login-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#ff9f43;
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
}

.login-btn:hover{
  background:#ff8c2f;
}

@media (max-width: 480px){
  body{
    align-items:flex-start;
    height:auto;
    min-height:100vh;
    padding:18px 12px;
  }

  .login-container{
    width:100%;
    max-width:360px;
    padding:24px 14px;
    border-radius:14px;
  }

  .login-btn, input{
    min-height:44px;
  }
}

</style>

</head>

<body>

<div class="login-container">

  <div class="login-header">
    <h2>Reset Password</h2>
    <p>Create a new password for your account</p>
  </div>

  <form id="resetForm">

    <div class="form-group">
      <label for="password">New Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>

        <input
          type="password"
          id="password"
          placeholder="Enter new password"
          required
        >

        <button type="button" class="password-toggle" onclick="togglePassword()">👁️</button>
      </div>
    </div>

    <button type="submit" class="login-btn">
      Reset Password
    </button>

  </form>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

document.getElementById("resetForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const password = document.getElementById("password").value;

  const res = await fetch(`/api/auth/reset-password/${token}`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if(res.ok){

    alert("Password reset successful! Redirecting to login...");

    setTimeout(() => {
      window.location.href = "/login.html";
    }, 1000);

  }else{
    alert(data.message);
  }

});
function togglePassword(){
  const input=document.getElementById("password");

  if(input.type==="password"){
    input.type="text";
  }else{
    input.type="password";
  }
}

</script>

</body>
</html>
