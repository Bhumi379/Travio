<!DOCTYPE html>
<html>
<head>
  <title>Verify OTP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: #45a049;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Verify Your Email</h2>

  <input type="email" id="email" placeholder="Enter your email" required />
  <input type="text" id="otp" placeholder="Enter OTP" required />

  <button onclick="verifyOtp()">Verify</button>
<button onclick="resendOtp()" style="background:#2196F3; margin-top:10px;">
  Resend OTP
</button>

  <div class="message" id="message"></div>
</div>

<script>

window.onload = function () {
  const savedEmail = localStorage.getItem("userEmail");
  if (savedEmail) {
    document.getElementById("email").value = savedEmail;
  }
};

async function verifyOtp() {
  const email = document.getElementById("email").value.trim();
  const otp = document.getElementById("otp").value.trim();
  const messageBox = document.getElementById("message");

  if (!email || !otp) {
    messageBox.innerText = "Please enter email and OTP";
    messageBox.style.color = "red";
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/api/auth/verify-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, otp })
    });

    const data = await response.json();

    if (response.ok) {
      messageBox.innerText = "✅ " + data.message;
      messageBox.style.color = "green";

      localStorage.removeItem("userEmail");

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1500);

    } else {
      messageBox.innerText = "❌ " + data.message;
      messageBox.style.color = "red";
    }

  } catch (error) {
    messageBox.innerText = "Something went wrong";
    messageBox.style.color = "red";
  }
}

// Resend OTP
async function resendOtp() {
  const email = document.getElementById("email").value.trim();
  const messageBox = document.getElementById("message");

  if (!email) {
    messageBox.innerText = "Enter email first";
    messageBox.style.color = "red";
    return;
  }

  try {
    const response = await fetch("http://localhost:5000/api/auth/resend-otp", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email })
    });

    const data = await response.json();

    if (response.ok) {
      messageBox.innerText = "📩 OTP resent to your email";
      messageBox.style.color = "green";
    } else {
      messageBox.innerText = data.message;
      messageBox.style.color = "red";
    }

  } catch (error) {
    messageBox.innerText = "Something went wrong";
    messageBox.style.color = "red";
  }
}

</script>

</body>
</html>
